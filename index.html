<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Pico Turtle Graphics</title>
  <link rel="stylesheet" href="node_modules/bootstrap/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/index.css">

  <script src="node_modules/ace-builds/src-noconflict/ace.js" type="text/javascript" charset="utf-8"></script>
  <script defer src="./fonts/fontawesome-all.min.js"></script>

  <style type="text/css" media="screen">
    #editor {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
    }
  </style>

</head>

<body class="container-fluid bg-dark box">
  <div class="row m-0 mt-1 md-2 header">
    <div class="col-md-4 col-xs-4">
      <button class="btn bg-light btn-outline-dark float-center btn-sm p-1" onclick="r.tcmd.run()">
        <span class="btn-text">RUN
          <i class="fas fa-play fa-sm"></i>
        </span>
      </button>
      <button class="btn bg-light btn-outline-dark float-center btn-sm p-1" onclick="r.tcmd.reset();">
        <span class="btn-text">CLEAR
          <i class="fas fa-eraser fa-sm"></i>
        </span>
      </button>
    </div>

    <div class="col-md-4 col-xs-4">
      <span id="turtleHeader" class="float-center" style="color: #99ffcc">Pico Turtle Graphics</span>
    </div>
    <div class="col-md-4 col-xs-4 m-0 p-0">

      <button class="btn bg-light btn-outline-dark float-right btn-sm p-1 ml-1" onclick="r.tcmd.exit()">
        <span class="btn-text">QUIT
          <i class="fas fa-sign-out-alt fa-sm"></i>
        </span>
      </button>
      <button class="btn bg-light btn-outline-dark float-right btn-sm p-1 ml-1" onclick="r.tcmd.save()">
        <span class="btn-text">SAVE
          <i class="fas fa-save fa-sm"></i>
        </span>
      </button>
      <button class="btn bg-light btn-outline-dark float-right btn-sm p-1 ml-1" onclick="r.tcmd.open()">
        <span class="btn-text">OPEN
          <i class="fas fa-file fa-sm"></i>
        </span>
      </button>
      <button class="btn bg-light btn-outline-dark float-right btn-sm p-1 ml-1" onclick="r.tcmd.newFile()">
          <span class="btn-text">NEW
            <i class="fas fa-file fa-sm"></i>
          </span>
        </button>
    </div>
  </div>
  <div class="row content mt-1">
    <div class="col-md-5 col-xs-5 h-90">
      <div id="editor" class="h-90">
      </div>
    </div>
    <div class="col-md-7 col-xs-7">
      <div class="" id="turtleCanvasContainer">
        <canvas class="w-100 h-90 bg-light" height=768 width=1080 id="turtleCanvas">
        </canvas>
      </div>
    </div>
  </div>

  <div class="row footer">
    <footer class="fixed-bottom bg-info ">
      <small>
        file name:
        <span id='filename'></span>
      </small>
    </footer>
  </div>
  <!-- All of the Node.js APIs are available in this renderer process. -->
  <!-- We are using Node.js <script>document.write(process.versions.node)</script>,
    Chromium <script>document.write(process.versions.chrome)</script>,
    and Electron <script>document.write(process.versions.electron)</script>. -->

  <script>
    // You can also require other files to run in this process
    let r = require('./renderer.js')
  </script>
</body>

</html>
