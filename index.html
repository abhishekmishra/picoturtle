<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>PicoTurtle</title>
  <!-- <link rel="stylesheet" href="./node_modules/bootstrap/dist/css/bootstrap.min.css"> -->
  <link rel="stylesheet" href="./assets/fontawesome-free-5.7.2-web/css/all.css">
  <link id="theme_css" rel="stylesheet" href="css/light.css">
  <link id="main_css" rel="stylesheet" href="out/css/main.css">
</head>

<body class="main_window">
  <div class="toolbar_container m-0 p-0">
    <div class="main_tools">
      <button id="new_button" class="btn btn-secondary btn-sm"><i class="fas fa-file"></i> New</button>
      <button id="open_button" class="btn btn-secondary btn-sm"><i class="fas fa-folder-open"></i> Open</button>
      <button id="save_button" class="btn btn-secondary btn-sm"><i class="fas fa-save"></i> Save</button>
      <button id="save_as_button" class="btn btn-secondary btn-sm"><i class="fas fa-save"></i> Save As</button>
      <button id="run_button" class="btn btn-secondary btn-sm"><i class="fas fa-play"></i> Run</button>
      <button id="export_button" class="btn btn-secondary btn-sm"><i class="fas fa-file-export"></i> Export</button>
    </div>
    <div class="lang_select_tools">
      <div class="input-group-prepend" style="text-align: right;">
        <label class="input-group-text" for="inputGroupSelect01">Language</label>
      </div>
      <div>
        <select id="editor_language_select" class="form-control">
          <option value="javascript">JavaScript</option>
          <option value="python">Python</option>
          <option value="csharp">C#</option>
          <option value="java">Java</option>
        </select>
      </div>
    </div>
    <div class="example_select_tools">
      <div class="input-group-prepend">
        <label class="input-group-text" for="inputGroupSelect01">Sample</label>
      </div>
      <select id="editor_sample_select" class="form-control">
      </select>
    </div>
    <div class="util_tools">
      <span class="badge badge-light m-1" id="homelink">
      </span>
      <button id="pref_button" class="btn btn-secondary btn-sm"><i class="fas fa-cog"></i></button>
      <button id="help_button" class="btn btn-secondary btn-sm"><i class="fas fa-question"></i></button>
    </div>
    <!-- Language: <span id="editor_language"></span> -->
  </div>
  <div class="main_container">
    <!-- <div class="turtle_code_container"> -->
      <div id="turtle_code">
      </div>
    <!-- </div> -->
    <div class="">
      <div id="turtle_toolbar_container" class="row d-flex flex-row m-0 p-0 justify-content-center">
        <div class="form-check ml-1 mr-1">
          <input class="form-check-input" type="checkbox" value="" id="animate" required>
          <label class="form-check-label" for="animate">
            Animate
          </label>
        </div>
        <div class="form-check ml-1 mr-1">
          <input class="form-check-input" type="checkbox" value="" id="draw_on_stop" required>
          <label class="form-check-label" for="draw_on_stop">
            Draw On Stop
          </label>
        </div>
        <div class="form-check ml-1 mr-1">
          <input class="form-check-input" type="checkbox" value="" id="draw_turtle" required>
          <label class="form-check-label" for="draw_turtle">
            Show Turtle
          </label>
        </div>
      </div>
      <div id="turtle_canvas_container" class="row m-0 p-0 d-flex flex-row align-self-center align-items-center">
        <div class="col-12 p-1">
          <canvas id="turtle_canvas" width="500" height="500" class="border border-secondary rounded m-1 p-1"></canvas>
        </div>
      </div>
      <div id="turtle_console_container" class="row p-0 m-0 mt-2 border border-secondary rounded">
        <div class="col-12 p-0 m-0">
          <div class="row p-0 m-0">
            <div class="col-12 p-0 m-0">
              <div class="text-left p-0 m-0">
                <div class="alert alert-dark m-0 p-0 text-center" role="alert">Program output</div>
              </div>
            </div>
          </div>
          <div class="row p-0 m-0">
            <div class="col-12 m-0 p-1">
              <ul id="turtle_console" class="m-0 p-0"></ul>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="statusbar_container toolbar m-0 p-0">
    <div class="col-6 p-1 text text-dark statusbar-item" id="editor_file"></div>
    <div class="col-6 p-1 text text-dark statusbar-item" id="turtle_details">
      <div class="row m-0 p-0">
        <div class="col-11 m-0 p-0">
          <span class="" id="turtle_name">No Turtle</span>
        </div>
        <div class="col-1 m-0 p-0 text-right">
          <i id="status_starting" class="fas fa-dot-circle fa-lg text-danger" style="display: none"></i>
          <i id="status_running" class="fas fa-cog fa-spin fa-lg text-info" style="display: none"></i>
          <i id="status_fail" class="fas fa-times fa-lg text-danger" style="display: none"></i>
          <i id="status_success" class="fas fa-check fa-lg text-success" style="display: none"></i>
        </div>
      </div>
    </div>
    <!-- <div class="col-3">

        </div> -->
    <!-- <div class="col-3 text-right">
          <span class="badge badge-secondary m-1" id="homelink">
            PicoTurtle © 2019 Abhishek Mishra
          </span>
        </div> -->
  </div>
  </div>
  <!-- See https://stackoverflow.com/questions/50283710/is-not-defined-using-jquery-with-electron-js -->
  <!-- Insert this line above script imports  -->
  <script>if (typeof module === 'object') { window.module = module; module = undefined; }</script>

  <!-- normal script imports etc  -->
  <script src="./node_modules/jquery/dist/jquery.min.js"></script>
  <!-- <script src="scripts/vendor.js"></script> -->

  <!-- Insert this line after script imports -->
  <script>if (window.module) module = window.module;</script>
  <script>
    // You can also require other files to run in this process
    require('./renderer.js')
  </script>
  <script src="./assets/fontawesome-free-5.7.2-web/js/all.js" />

</body>

</html>
