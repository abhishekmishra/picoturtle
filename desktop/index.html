<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>PicoTurtle</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="./node_modules/bootstrap/dist/css/bootstrap.min.css">
</head>

<body class="container-fluid h-100 m-0 p-0 d-flex flex-column">
  <div class="row m-0 p-0">
    <div class="toolbar m-0 p-2 col-12 mb-2">
      <div class="row m-0 p-0">
        <div class="col-5">
          <button id="new_button" class="btn btn-secondary btn-sm">New</button>
          <button id="open_button" class="btn btn-secondary btn-sm">Open</button>
          <button id="save_button" class="btn btn-secondary btn-sm">Save</button>
          <button id="save_as_button" class="btn btn-secondary btn-sm">Save As</button>
          <button id="run_button" class="btn btn-secondary btn-sm">Run</button>
          <button id="export_button" class="btn btn-secondary btn-sm">Export</button>
        </div>
        <div class="col-2">
          <div class="input-group input-group-smmb-3 input-group-sm">
            <div class="input-group-prepend">
              <label class="input-group-text" for="inputGroupSelect01">Language</label>
            </div>
            <select id="editor_language_select" class="form-control">
              <option value="python">Python</option>
              <option value="javascript">JavaScript</option>
            </select>
          </div>
        </div>
        <div class="col-5 text-right">
          <button id="help_button" class="btn btn-secondary btn-sm">?</button>
        </div>
      </div>
      <!-- Language: <span id="editor_language"></span> -->
    </div>
  </div>
  <div class="row flex-grow-1 h-100 m-0 p-0">
    <div id="turtle_code_container" class="col-6">
      <div id="turtle_code">
      </div>
    </div>
    <div class="d-flex flex-column col-6 h-100 m-0 p-0">
      <div id="turtle_canvas_container" class="row m-0 p-0 d-flex flex-row align-self-center align-items-center">
        <div class="col-12 p-1">
          <canvas id="turtle_canvas" width="500" height="500" class="border border-secondary rounded"></canvas>
        </div>
      </div>
      <div class="row p-0 m-1 mr-2">
        <div class="col-12">
          <div class="text-center">Program output</div>
        </div>
      </div>
      <div id="turtle_console_container" class="row m-1 mr-2 p-2 border border-secondary rounded">
        <div class="col-12 m-0 p-0">
          <ul id="turtle_console" class="m-0 p-0"></ul>
        </div>
      </div>
    </div>
  </div>
  <div class="row m-0 p-0">
    <div class="toolbar m-0 p-0 pl-1 pr-1 col-12">
      <div class="row">
        <div class="col-6">
          <span class="text text-dark" id="editor_file"></span>,
          Turtle: <span class="" id="turtle_name">...</span>
        </div>
        <div class="col-3">

        </div>
        <div class="col-3 text-right">
          <a href="https://github.com/abhishekmishra/picoturtle" target="_blank">
            PicoTurtle v0.0.1 © 2019 Abhishek Mishra
          </a>
        </div>
      </div>
    </div>
  </div>
  <!-- See https://stackoverflow.com/questions/50283710/is-not-defined-using-jquery-with-electron-js -->
  <!-- Insert this line above script imports  -->
  <script>if (typeof module === 'object') { window.module = module; module = undefined; }</script>

  <!-- normal script imports etc  -->
  <script src="./node_modules/jquery/dist/jquery.min.js"></script>
  <!-- <script src="scripts/vendor.js"></script> -->

  <!-- Insert this line after script imports -->
  <script>if (window.module) module = window.module;</script>
  <script>
    // You can also require other files to run in this process
    require('./renderer.js')
  </script>
  <!-- <script>
      
  </script> -->
</body>

</html>
