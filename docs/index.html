<html>

<head>
    <title>PicoTurtle: A tiny turtle.</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
        integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</head>

<body class="container-fluid">
    <div class="row">
        <div class="col-12">
            <h1>PicoTurtle</h1>
        </div>
    </div>
    <div class="row">
        <div class="col-12">
            <p>PicoTurtle lets your create turtle graphics in the programming language of your choice.
            </p>
        </div>
    </div>
    <div class="row">
        <div class="col-12">
            <button id="windows-download" class="btn btn-primary btn-large">Download PicoTurtle for Windows
                64bit</button>
            <button id="macos-download" class="btn btn-primary btn-large">Download PicoTurtle for MacOS 64bit</button>
            <button id="linux-download" class="btn btn-primary btn-large">Download PicoTurtle for Linux 64bit</button>
        </div>
    </div>
    <script>
        $(document).ready(() => {
            var OSName = "Unknown OS";
            if (navigator.appVersion.indexOf("Win") != -1) OSName = "Windows";
            if (navigator.appVersion.indexOf("Mac") != -1) OSName = "MacOS";
            if (navigator.appVersion.indexOf("X11") != -1) OSName = "UNIX";
            if (navigator.appVersion.indexOf("Linux") != -1) OSName = "Linux";

            $('#windows-download').hide();
            $('#macos-download').hide();
            $('#linux-download').hide();
            if (OSName == "Windows") {
                $('#windows-download').show();
            }
            if (OSName == "Mac") {
                $('#macos-download').show();
            }
            if (OSName == "Linux" || OSName == "UNIX") {
                $('#linux-download').show();
            }
        });
    </script>
</body>

</html>
