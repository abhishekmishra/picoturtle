language: node_js
node_js: 
  - "10"
os:
  - linux
  - osx
dist: xenial
osx_image: xcode8.3
sudo: false

cache:
  directories:
  - node_modules
  - $HOME/.cache/electron

addons:
  apt:
    packages:
    - fakeroot
    - rpm
    - mono-complete
    - nuget
  homebrew:
    packages:
    - mono
    - nuget

branches:
  only:
  - master
  - /^v\d+\.\d+\.\d+/

install:
- npm install
- npm update
- ./client/csharpPackageRestore.sh

script:
- if test -z "$TRAVIS_TAG"; then npm run make; fi
after_success: if test -n "$TRAVIS_TAG"; then npm run publish; fi

notifications:
  email:
    - abhishekmishra3@gmail.com